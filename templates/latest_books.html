{% extends "base.html" %}
{% block title %}Latest Books{% endblock %}


{% block body %}

    <div id="main">
        <div id="background-canvas">
            <div id="canvas">
                <br/>
                <h1 style="text-align: center;">Browse Our Latest Books</h1>
                <br/>
                {% include 'searchbar.html' %}
                <br/>
                {% if message %}
                <div class="alert alert-danger alert-dismissible fade show" role="alert">{{message}}</div>
                {% endif %}              
                <div class="row row-cols-1 row-cols-md-3 g-4">
                    {% for book in books%}
                        {% include 'book.html' %}
                    {% endfor %}
                </div>
            </div>
            <br/>
        </div>
    </div>

{% endblock %}
