<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Login</title>
        <link rel="stylesheet" href="/static/style.css">
        <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.7.1/jquery.min.js"></script>
        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
        <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js" integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz" crossorigin="anonymous"></script>
        <style>
            body, html {
                height: 100%;
            }
            body {
                background-image: url("/static/library_background.jpg");
                height: 100%;
                background-position: center;
                background-repeat: no-repeat;
                background-size: cover;
            }
            #login{
                background-color: rgba(0, 0, 0, 0.65)
            }
        </style>
    </head>
    <body>
        <div id = "login">
            <div id = "form-body">
                <br>
                <h1 style = "text-align: center; color: white;"> User Login </h1>
                <br/>
                {% if message %}
                <div class="alert alert-danger alert-dismissible">
                    <a href="#" class="close" data-dismiss="alert" aria-label="close">&times;</a>
                    <strong>{{message}}</strong>
                  </div>
                {% endif %}
                <form action="{{ url_for('login') }}" method="post">
                    <div class="form-floating mb-3">
                        <input class="form-control" id="floatingInput" placeholder="Username" type="text" name="user_name" required>
                        <label for="floatingInput">Username</label>
                    </div>
                    <div class="form-floating">
                        <input type="password" class="form-control" id="floatingPassword" placeholder="Password" type="text" name="pass" required>
                        <label for="floatingPassword">Password</label>
                    </div>
                    <br/>
                    <div style = "text-align: center;">
                        <input class="btn btn-primary" type="submit" value="Submit">
                    </div>
    
                </form>
                <br/>
                <div id="links" style="color: white; text-align: center;">
                    <p>Not registered? <a href = "/register"> Register here </a> </p>
                    <p>Click here for <a href = "/librarian_login"> librarian login</a>. </p>
                </div>
            </div>
        </div>
    </body>
</html>
